<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléphones</title>
    <link rel="stylesheet" href="../CSS/products.css">
</head>

<body>
    <header class="main-header">
        <a href="accueil.html">
            <img src="../images/logo epsi.png" alt="Logo" class="logo">
        </a>
        <nav>
            <ul class="nav-list">
                <li><a href="accueil.html">Accueil</a></li>
                <li><a href="A propos.html">À propos</a></li>
                <li><a href="Nous contacter.html">Nous contacter</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-page">
        <h1>Téléphones</h1>
        <p>Les derniers smartphones à la pointe de la technologie.</p>

        <div class="product-grid">
            <div class="product-card">
                <img src="../images/iphone 15.webp" alt="iPhone 15">
                <h2>iPhone 15</h2>
                <p>128 Go, écran OLED, double caméra</p>
                <span class="price">1099 €</span>
            </div>

            <div class="product-card">
                <img src="../images/samsung s24.webp" alt="Samsung S24">
                <h2>Samsung Galaxy S24</h2>
                <p>256 Go, écran AMOLED, triple caméra</p>
                <span class="price">999 €</span>
            </div>

            <div class="product-card">
                <img src="../images/xaoimie.webp" alt="Xiaomi">
                <h2>Xiaomi Redmi Note 13</h2>
                <p>128 Go, batterie 5000 mAh</p>
                <span class="price">399 €</span>
            </div>
        </div>
    </main>
</body>

</html>

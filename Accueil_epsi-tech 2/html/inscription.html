<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - TechSphere</title>
    <link rel="stylesheet" href="../CSS/inscription.css">
    <link rel="stylesheet" href="../php/inscription.php">
</head>

<body>
    <header class="header">
        <nav class="nav">
            <div class="logo">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <div class="logo-icon">💻</div>
                    <div class="logo-text">
                        <span class="logo-name">TechSphere</span>
                    </div>
                </a>
            </div>
            <div class="auth-buttons">
                <a href="connection.html" class="btn-login">🔐 Connexion</a>
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h1>📝 Inscription</h1>
                <p>Rejoignez la communauté TechSphere</p>

                <form class="auth-form">
                    <div class="input-row">
                        <div class="input-group">
                            <label>👤 Prénom</label>
                            <input type="text" placeholder="Votre prénom" required>
                        </div>
                        <div class="input-group">
                            <label>👤 Nom</label>
                            <input type="text" placeholder="Votre nom" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>📧 Adresse email</label>
                        <input type="email" placeholder="votre@email.com" required>
                    </div>

                    <div class="input-group">
                        <label>🔒 Mot de passe</label>
                        <input type="password" placeholder="Créez un mot de passe" required>
                    </div>

                    <div class="input-group">
                        <label>✅ Confirmer le mot de passe</label>
                        <input type="password" placeholder="Confirmez votre mot de passe" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" required>
                            J'accepte les <a href="#">conditions d'utilisation</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary full-width">🎉 Créer mon compte</button>
                </form>

                <div class="auth-links">
                    <p>Déjà un compte ? <a href="ecommerce.html">Se connecter</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 TechSphere. Tous droits réservés.</p>
        </div>
    </footer>
</body>

</html>

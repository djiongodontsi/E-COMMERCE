<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - TechSphere</title>
    <link rel="stylesheet" href="../CSS/connection.css">
    <link rel="stylesheet" href="../PHP/connection.php">

</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <div class="logo-icon">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <div class="logo-text">
                        <span class="logo-name">TechSphere</span>
                        <span class="logo-tagline">Votre univers tech</span>
                    </div>
                </a>
            </div>
            <div class="auth-buttons">
                <a href="inscription.html" class="btn-signup">
                    <i class="fas fa-user-plus"></i>
                    S'inscrire
                </a>
            </div>
        </nav>
    </header>

    <!-- Section Connexion -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Messages d'alerte -->
                <div id="message" class="message-container"></div>

                <div class="auth-header">
                    <h1><i class="fas fa-sign-in-alt"></i> Connexion</h1>
                    <p>Accédez à votre compte TechSphere</p>
                </div>

                <form action="php/connexion.php" method="POST" class="auth-form" id="loginForm">
                    <div class="input-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Adresse email
                        </label>
                        <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                        <div class="validation-message" id="email-error"></div>
                    </div>

                    <div class="input-group">
                        <label for="mot_de_passe">
                            <i class="fas fa-lock"></i>
                            Mot de passe
                        </label>
                        <div class="password-container">
                            <input type="password" id="mot_de_passe" name="mot_de_passe"
                                placeholder="Votre mot de passe" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="validation-message" id="password-error"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" name="remember_me" id="remember_me">
                            <span class="checkmark"></span>
                            Se souvenir de moi
                        </label>
                        <a href="mot-de-passe-oublie.html" class="forgot-password">
                            Mot de passe oublié ?
                        </a>
                    </div>

                    <button type="submit" class="btn-primary full-width" id="submitBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        <a href="ecommerce.html"> Se connecter</a>
                    </button>

                    <div class="social-login">
                        <div class="divider">
                            <span>Ou connectez-vous avec</span>
                        </div>
                        <div class="social-buttons">
                            <button type="button" class="social-btn google-btn">
                                <i class="fab fa-google"></i>
                                Google
                            </button>
                            <button type="button" class="social-btn facebook-btn">
                                <i class="fab fa-facebook-f"></i>
                                Facebook
                            </button>
                        </div>
                    </div>
                </form>

                <div class="auth-links">
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">

        </div>

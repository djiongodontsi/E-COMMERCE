<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Mon Panier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/panier.js" defer></script>
    <link rel="stylesheet" href="Style/panier.css" />
  </head>

  <body>
    <header>
      <a href="accueil.html">
        <img src="IMG/logo_epsi_8b6f0271b8.png" alt="Logo" />
      </a>

      <nav>
        <ul class="un_list">
          <li><a href="accueil.html">Accueil</a></li>
          <li><a href="a_ propos.html">A propos</a></li>
          <li><a href="nous_contacter.html">Nous contacter</a></li>
        </ul>
      </nav>
    </header>

    <div class="container">
      <h1>Panier</h1>

      <table>
        <thead>
          <tr>
            <th>Produit</th>
            <th>Prix</th>
            <th>Quantité</th>
            <th>Total</th>
            <th>Supprimer</th>
          </tr>
        </thead>
        <tbody id="panier-corps"></tbody>
      </table>

      <div class="total" id="total-panier">Total : 0 €</div>
      <button id="payer-btn" class="btn-pay">Procéder au paiement</button>
      <div
        id="payment-toast"
        class="payment-toast"
        role="status"
        aria-live="polite"
      >
        Paiement effectué ✓
      </div>
    </div>
    <script>
      (function () {
        const payerBtn = document.getElementById('payer-btn');
        const toast = document.getElementById('payment-toast');

        function showToast(message) {
          toast.textContent = message;
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2600);
        }

        payerBtn &&
          payerBtn.addEventListener('click', function () {
            payerBtn.disabled = true;
            const origText = payerBtn.textContent;
            payerBtn.textContent = 'Traitement…';
            setTimeout(() => {
              showToast('Paiement effectué ✓');
              payerBtn.textContent = origText;
              payerBtn.disabled = false;

              try {
                localStorage.removeItem('panier');
              } catch (e) {}
            }, 1400);
          });
      })();
    </script>
  </body>
</html>
